/* ═══ UTILS ═══ */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const rollDice=f=>{const res=[];let t=0;const p=f.match(/(\d+)d(\d+)/g);const bm=f.match(/([+\-]\s*\d+)(?!.*d)/);const b=bm?parseInt(bm[0].replace(/\s/g,"")):0;if(p)p.forEach(x=>{const[n,s]=x.split("d").map(Number);for(let i=0;i<n;i++){const v=Math.floor(Math.random()*s)+1;res.push({sides:s,value:v});t+=v;}});return{results:res,bonus:b,total:t+b,formula:f};};
const d20=()=>Math.floor(Math.random()*20)+1;
const calcCD=(pb,st,sk)=>sk?8+pb+(st[sk]?.mod||0):null;
const effMax=c=>Math.max(0,c.hpMax-(c.hpPerm||0));
const oColor=(os,id)=>os.find(o=>o.id===id)?.color||"#c8a95e";
const sortAbs=(a,o)=>{const m={};o.forEach((x,i)=>m[x.id]=i);return[...a].sort((x,y)=>(m[x.originId]??999)-(m[y.originId]??999));};
const BASE=()=>{let b=window.GITHUB_BASE||"";if(b.endsWith("/"))b=b.slice(0,-1);return b;};
async function fetchJ(u){try{const r=await fetch(u+"?t="+Date.now());if(!r.ok)return null;return await r.json();}catch{return null;}}

function normalizeCharJSON(data){
  if(!data) return null;
  let ch=null;
  if(data.character && data.character.name && data.character.stats) ch=data.character;
  else if(data.name && data.stats) ch=data;
  if(ch) ch.skills=migrateSkills(ch.skills);
  return ch;
}

/* ═══ AVATAR COMPONENT ═══ */
function Av({src,fallback,size,color,round,style:extra}){
  const[ok,setOk]=useState(true);
  const sz=size||48;
  const radius=round===false?"8px":"50%";
  if(src&&ok)return React.createElement("img",{src,onError:()=>setOk(false),style:{width:sz,height:sz,borderRadius:radius,objectFit:"cover",border:`2px solid ${color||"#c8a95e"}`,flexShrink:0,background:"rgba(200,169,94,0.08)",...extra}});
  return React.createElement("div",{style:{width:sz,height:sz,borderRadius:radius,background:(color||"#c8a95e")+"22",border:`2px solid ${color||"#c8a95e"}`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Cinzel'",fontWeight:900,fontSize:sz*0.42,color:color||"#c8a95e",flexShrink:0,...extra}},fallback);
}

async function H(s){const e=new TextEncoder().encode(s);const h=await crypto.subtle.digest("SHA-256",e);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,"0")).join("");}

/* ═══ CRYPTO: AES-GCM token storage ═══ */
function hex2b(h){const b=new Uint8Array(h.length/2);for(let i=0;i<h.length;i+=2)b[i/2]=parseInt(h.substr(i,2),16);return b;}
async function aesEnc(text,passHash){const k=await crypto.subtle.importKey("raw",hex2b(passHash).slice(0,32),{name:"AES-GCM"},false,["encrypt"]);const iv=crypto.getRandomValues(new Uint8Array(12));const enc=await crypto.subtle.encrypt({name:"AES-GCM",iv},k,new TextEncoder().encode(text));return JSON.stringify({i:Array.from(iv),d:Array.from(new Uint8Array(enc))});}
async function aesDec(stored,passHash){try{const{i,d}=JSON.parse(stored);const k=await crypto.subtle.importKey("raw",hex2b(passHash).slice(0,32),{name:"AES-GCM"},false,["decrypt"]);const dec=await crypto.subtle.decrypt({name:"AES-GCM",iv:new Uint8Array(i)},k,new Uint8Array(d));return new TextDecoder().decode(dec);}catch{return null;}}

/* ═══ GITHUB API: save file with SHA conflict check ═══ */
async function ghPut(path,content,token,accId,isMaster,accName){
  if(!isMaster&&accId){
    const allowed=path===`data/manifest.json`||path.startsWith(`data/${accId}/`);
    if(!allowed){console.error("Accesso negato:",path);return false;}
  }
  const u=new URL(BASE());const user=u.hostname.split(".")[0];const repo=u.pathname.replace(/^\/|\/$/g,"");
  const api=`https://api.github.com/repos/${user}/${repo}/contents/${path}`;
  const hd={"Authorization":`token ${token}`,"Accept":"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"};
  // GET current file SHA (required for update)
  let sha=null;
  try{const r=await fetch(api+"?t="+Date.now(),{headers:{...hd,"If-None-Match":""},cache:"no-store"});if(r.ok){const j=await r.json();sha=j.sha;}}catch{}
  const body={message:`[${accName||accId||"?"}] Update ${path}`,content:btoa(unescape(encodeURIComponent(content)))};
  if(sha)body.sha=sha;
  const res=await fetch(api,{method:"PUT",headers:{...hd,"Content-Type":"application/json"},body:JSON.stringify(body)});
  return res.ok;
}
async function ghLog(owner,action,token,accId,isMaster,accName){
  const path=`data/${owner}/history.log`;
  const ts=new Date().toISOString();
  const line=`${ts} | ${accName||accId} | ${action}\n`;
  const u=new URL(BASE());const user=u.hostname.split(".")[0];const repo=u.pathname.replace(/^\/|\/$/g,"");
  const api=`https://api.github.com/repos/${user}/${repo}/contents/${path}`;
  const hd={"Authorization":`token ${token}`,"Accept":"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"};
  let sha=null,existing="";
  try{const r=await fetch(api+"?t="+Date.now(),{headers:{...hd,"If-None-Match":""},cache:"no-store"});if(r.ok){const j=await r.json();sha=j.sha;existing=decodeURIComponent(escape(atob(j.content.replace(/\n/g,""))));}}catch{}
  const body={message:`[${accName||accId}] Log ${path}`,content:btoa(unescape(encodeURIComponent(existing+line)))};
  if(sha)body.sha=sha;
  try{await fetch(api,{method:"PUT",headers:{...hd,"Content-Type":"application/json"},body:JSON.stringify(body)});}catch{}
}

/* ═══ SESSION RECOVERY ═══ */
const SESS_KEY="dnd_session";
function saveSession(accId,char){try{sessionStorage.setItem(SESS_KEY,JSON.stringify({accId,char,ts:Date.now()}));}catch{}}
function loadSession(accId){try{const d=JSON.parse(sessionStorage.getItem(SESS_KEY));if(d&&d.accId===accId&&d.char&&(Date.now()-d.ts)<1200000)return d.char;return null;}catch{return null;}}
function clearSession(){try{sessionStorage.removeItem(SESS_KEY);}catch{}}

const TABS=[{id:"stats",icon:"⚓",label:"Scheda"},{id:"actions",icon:"⚔️",label:"Azioni"},{id:"spells",icon:"📕",label:"Magie"},{id:"dice",icon:"🎲",label:"Dadi"},{id:"notes",icon:"📜",label:"Note"},{id:"export",icon:"💾",label:"Esporta"}];
const AT=["Azione","Azione bonus","Reazione","Passiva","Rituale"];
const RT=[{v:null,l:"Nessuna"},{v:"breve",l:"R. Breve"},{v:"lungo",l:"R. Lungo"}];
const SK=["FOR","DES","COS","INT","SAG","CAR"];
const OP=["#e74c3c","#e67e22","#3498db","#8e44ad","#1abc9c","#f1c40f","#2ecc71","#e91e63","#00bcd4","#ff5722"];
const DO=[
  {id:"haki_arm",name:"Haki Armatura",color:"#8e44ad"},
  {id:"haki_oss",name:"Haki Osservazione",color:"#1abc9c"},
  {id:"haki_re",name:"Haki del Re",color:"#f1c40f"},

/* ═══ SKILL DI DEFAULT 5e ═══ 
   Modifica questo array per aggiungere/rimuovere skill di default.
   stat: la caratteristica associata (FOR/DES/COS/INT/SAG/CAR)
*/
const DEFAULT_SKILLS=[
  {name:"Acrobazia",stat:"DES",prof:"none"},
  {name:"Addestrare Animali",stat:"SAG",prof:"none"},
  {name:"Arcano",stat:"INT",prof:"none"},
  {name:"Atletica",stat:"FOR",prof:"none"},
  {name:"Furtività",stat:"DES",prof:"none"},
  {name:"Indagare",stat:"INT",prof:"none"},
  {name:"Inganno",stat:"CAR",prof:"none"},
  {name:"Intimidire",stat:"CAR",prof:"none"},
  {name:"Intrattenere",stat:"CAR",prof:"none"},
  {name:"Intuizione",stat:"SAG",prof:"none"},
  {name:"Medicina",stat:"SAG",prof:"none"},
  {name:"Natura",stat:"INT",prof:"none"},
  {name:"Percezione",stat:"SAG",prof:"none"},
  {name:"Persuasione",stat:"CAR",prof:"none"},
  {name:"Rapidità di Mano",stat:"DES",prof:"none"},
  {name:"Religione",stat:"INT",prof:"none"},
  {name:"Sopravvivenza",stat:"SAG",prof:"none"},
  {name:"Storia",stat:"INT",prof:"none"}
];

// prof: "none"|"prof"|"mastery" (retrocompat: true→"prof", false→"none")
function normProf(p){if(p===true)return"prof";if(p===false||!p)return"none";return p;}
function skMod(s,stats,pb){const p=normProf(s.prof);const bonus=p==="mastery"?pb*2:p==="prof"?pb:0;if(s.stat&&stats[s.stat])return stats[s.stat].mod+bonus;return(s.mod||0)+bonus;}
function atkHit(a,stats,pb){
  if(!a.stat)return(a.hit||0)+(a.bonusActive?a.bonusHit||0:0);
  const sm=a.stat&&stats[a.stat]?stats[a.stat].mod:0;return sm+pb+(a.bonusActive?a.bonusHit||0:0);
}
function atkDmg(a,stats){const sm=a.stat&&stats[a.stat]?stats[a.stat].mod:0;const base=a.damage||"";const bm=(a.bonusActive?a.bonusDmg||0:0)+sm;return base+(bm!==0?(bm>0?"+"+bm:""+bm):"");}

function migrateSkills(skills){
  if(!skills||!skills.length)return DEFAULT_SKILLS.map(s=>({...s}));
  const defMap={};DEFAULT_SKILLS.forEach(d=>{defMap[d.name.toLowerCase()]=d.stat;});
  return skills.map(s=>{
    const pr=normProf(s.prof);
    if(s.stat)return{...s,prof:pr};
    const match=defMap[s.name.toLowerCase()];
    if(match)return{name:s.name,stat:match,prof:pr==="none"?"prof":pr};
    return{name:s.name,stat:null,mod:s.mod||0,prof:pr};
  });
}
function newChar(n){return{id:uid(),name:n||"Nuovo PG",race:"",level:1,classes:"",ac:10,hpMax:10,hpCurrent:10,hpTemp:0,hpPerm:0,speed:9,passivePerception:10,profBonus:2,hitDie:"1d8",stats:{FOR:{score:10,mod:0,save:0,profSave:false},DES:{score:10,mod:0,save:0,profSave:false},COS:{score:10,mod:0,save:0,profSave:false},INT:{score:10,mod:0,save:0,profSave:false},SAG:{score:10,mod:0,save:0,profSave:false},CAR:{score:10,mod:0,save:0,profSave:false}},skills:DEFAULT_SKILLS.map(s=>({...s})),spellSlots:{cantrips:0,slots:{"1":{max:0,used:0},"2":{max:0,used:0},"3":{max:0,used:0},"4":{max:0,used:0},"5":{max:0,used:0},"6":{max:0,used:0},"7":{max:0,used:0},"8":{max:0,used:0},"9":{max:0,used:0}}},origins:[...DO],attacks:[],abilities:[],spells:[],notes:"",backstory:"",diceLog:[],effects:[]};}

/* ═══ APP WRAPPER ═══ */
function AppWrapper(){
  const fileRef=useRef(null);
  const[screen,setScreen]=useState("accounts");
  const[manifest,setManifest]=useState(null);
  const[accId,setAccId]=useState(null);
  const[char,setChar]=useState(null);
  const[charMeta,setCharMeta]=useState(null);
  const[loading,setLoading]=useState(true);
  const[ghToken,setGhToken]=useState(null);
  const[passHash,setPassHash]=useState(null);
  const[showTkSetup,setShowTkSetup]=useState(false);
  const[sessDismissed,setSessDismissed]=useState(false);

  useEffect(()=>{(async()=>{const b=BASE();if(b){const m=await fetchJ(`${b}/data/manifest.json`);setManifest(m);}setLoading(false);})();},[]);

  const acc=manifest?.accounts?.find(a=>a.id===accId);
  const ac=acc?.color||"#c8a95e";
  const isMaster=acc?.isMaster||false;
  const upChar=useCallback(u=>setChar(p=>({...p,...u})),[]);

  const loadToken=async(aid,ph)=>{const s=localStorage.getItem("tk_"+aid);if(!s)return null;return await aesDec(s,ph);};
  const storeToken=async(aid,ph,token)=>{const enc=await aesEnc(token,ph);localStorage.setItem("tk_"+aid,enc);};
  const saveToGH=async(owner,file,charObj)=>{
    if(!ghToken||!BASE())return false;
    const payload={account:acc?.name,accountId:accId,exportedAt:new Date().toISOString(),character:charObj};
    const ok=await ghPut(`data/${owner}/${file}`,JSON.stringify(payload,null,2),ghToken,accId,acc?.isMaster,acc?.name);
    if(ok)clearSession();
    if(ok)ghLog(owner,"Salvataggio "+file,ghToken,accId,isMaster,acc?.name);
    return ok;
  };
  const saveNewToGH=async(charObj)=>{
    if(!ghToken||!BASE()||!accId)return null;
    const fname=charObj.name.toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"")+".json";
    const owner=accId;
    const payload={account:acc?.name,accountId:accId,exportedAt:new Date().toISOString(),character:charObj};
    const ok=await ghPut(`data/${owner}/${fname}`,JSON.stringify(payload,null,2),ghToken,accId,acc?.isMaster,acc?.name);
    if(!ok)return null;
    ghLog(owner,"Nuovo PG "+fname,ghToken,accId,isMaster,acc?.name);
    // Update manifest
    try{
      const b=BASE();
      const mRaw=await fetch(`${b}/data/manifest.json?t=`+Date.now()).then(r=>r.json());
      if(!mRaw.characters[owner])mRaw.characters[owner]=[];
      if(!mRaw.characters[owner].find(c=>c.file===fname)){
        mRaw.characters[owner].push({file:fname,name:charObj.name,preview:`${charObj.race||"?"} · Lv ${charObj.level||1}${charObj.classes?" · "+charObj.classes:""}`});
        await ghPut("data/manifest.json",JSON.stringify(mRaw,null,2),ghToken,accId,acc?.isMaster,acc?.name);
        setManifest(mRaw);
      }
    }catch{}
    clearSession();
    return{owner,file:fname};
  };
  const sessionChar=accId?loadSession(accId):null;

  const loadGH=async(owner,file)=>{
    const b=BASE();
    if(!b)return null;
    setLoading(true);
    const raw=await fetchJ(`${b}/data/${owner}/${file}`);
    setLoading(false);
    return normalizeCharJSON(raw);
  };

  const doExport=()=>{
    if(!char)return;
    const p={account:acc?.name,accountId:accId,exportedAt:new Date().toISOString(),character:char};
    const bl=new Blob([JSON.stringify(p,null,2)],{type:"application/json"});
    const u=URL.createObjectURL(bl);
    const a=document.createElement("a");
    a.href=u;
    a.download=`${char.name.replace(/[^a-zA-Z0-9_]/g,"_")}.json`;
    a.click();
    URL.revokeObjectURL(u);
  };

  const doImport=e=>{
    const f=e.target.files[0];
    if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const raw=JSON.parse(ev.target.result);
        const ch=normalizeCharJSON(raw);
        if(ch){setChar(ch);setCharMeta(null);setScreen("sheet");}
        else{alert("File non valido: mancano i campi name o stats.");}
      }catch{alert("Errore nel parsing del file JSON.");}
      e.target.value="";
    };
    r.readAsText(f);
  };

  return(
    <>
      <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={doImport}/>
      <div style={{position:"fixed",top:6,left:8,fontSize:9,color:"#ffffff44",fontFamily:"'JetBrains Mono'",zIndex:999,pointerEvents:"none"}}>{APP_VERSION}</div>
      {loading&&<Ld msg="Caricamento..."/>}
      {!loading&&screen==="accounts"&&<AccountsScreen manifest={manifest} onAuth={async(id,ph)=>{setAccId(id);setPassHash(ph);const tk=await loadToken(id,ph);if(tk){setGhToken(tk);ghLog("default","Login",tk,id,manifest?.accounts?.find(a=>a.id===id)?.isMaster,manifest?.accounts?.find(a=>a.id===id)?.name);}else if(BASE()){setShowTkSetup(true);}setScreen("characters");}}/>}
      {!loading&&screen==="characters"&&(()=>{
        let sections=[];
        const mChars=manifest?.characters||{};
        if(isMaster){
          const own=mChars[accId]||[];
          if(own.length>0)sections.push({label:"I Miei PG",owner:accId,chars:own,color:ac});
          manifest?.accounts?.filter(a=>a.id!==accId).forEach(a=>{
            const ch=mChars[a.id]||[];
            if(ch.length>0)sections.push({label:`PG di ${a.name}`,owner:a.id,chars:ch,color:a.color});
          });
        }else{
          const own=mChars[accId]||[];
          if(own.length>0)sections.push({label:"I Miei PG",owner:accId,chars:own,color:ac});
        }
        return<CharScreen acc={acc} ac={ac} sections={sections} isMaster={isMaster}
          onBack={()=>{setAccId(null);setScreen("accounts");}}
          onNew={()=>{setChar(newChar(""));setCharMeta(null);setScreen("sheet");}}
          onLoadGH={async(owner,file)=>{const c=await loadGH(owner,file);if(c){setChar(c);setCharMeta({owner,file});setScreen("sheet");}else alert("Errore caricamento: file non valido o non raggiungibile.");}}
          onImportFile={()=>fileRef.current?.click()} loading={loading}/>;
      })()}
      {!loading&&screen==="sheet"&&char&&
        <Sheet char={char} isMaster={isMaster} up={upChar} ac={ac} acc={acc} charMeta={charMeta} ghToken={ghToken} saveToGH={saveToGH} saveNewToGH={saveNewToGH} setCharMeta={setCharMeta} accId={accId}
          onBack={()=>{if(confirm("Hai salvato? Le modifiche non salvate andranno perse.")){clearSession();setChar(null);setCharMeta(null);setScreen("characters");}}}
          onExport={doExport}
          onImport={()=>fileRef.current?.click()}/>}

      {/* Session recovery prompt */}
      {!loading&&screen==="characters"&&!char&&sessionChar&&!sessDismissed&&(()=>{
        return<div style={{position:"fixed",bottom:60,left:"50%",transform:"translateX(-50%)",zIndex:80,maxWidth:380,width:"calc(100% - 40px)",padding:"14px 16px",borderRadius:12,background:"linear-gradient(135deg,#1a2040,#151b2e)",border:"1.5px solid #f39c1266",boxShadow:"0 8px 32px rgba(0,0,0,0.6)",animation:"fadeIn 0.3s ease"}}>
          <p style={{fontSize:13,color:"#f39c12",fontFamily:"'Cinzel'",fontWeight:700,marginBottom:8}}>⚡ Sessione precedente trovata</p>
          <p style={{fontSize:11,color:"#998866",marginBottom:10}}>Vuoi riprendere {sessionChar.name||"il PG"} da dove avevi lasciato?</p>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>{clearSession();setSessDismissed(true);}} style={{flex:1,padding:"8px 0",borderRadius:7,border:"1px solid #e74c3c33",background:"rgba(231,76,60,0.08)",color:"#e74c3c",fontSize:11,fontWeight:700,fontFamily:"'Cinzel'",cursor:"pointer"}}>Ignora</button>
            <button onClick={()=>{setChar(sessionChar);setCharMeta(null);setScreen("sheet");}} style={{flex:2,padding:"8px 0",borderRadius:7,border:"1px solid #2ecc7166",background:"rgba(46,204,113,0.12)",color:"#2ecc71",fontSize:11,fontWeight:700,fontFamily:"'Cinzel'",cursor:"pointer"}}>Riprendi</button>
          </div>
        </div>;
      })()}

      {/* Token setup modal */}
      {showTkSetup&&<TkSetup onSave={async(tk)=>{if(passHash&&accId){await storeToken(accId,passHash,tk);setGhToken(tk);}setShowTkSetup(false);}} onSkip={()=>setShowTkSetup(false)}/>}
    </>
  );
}

function Ld({msg}){
  return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"var(--app-h)",background:"linear-gradient(180deg,#0a0e17,#111827)"}}>
    <div style={{textAlign:"center"}}>

/* ═══ ACCOUNTS ═══ */
function AccountsScreen({manifest,onAuth}){
  const[user,setUser]=useState("");
  const[pw,setPw]=useState("");
  const[err,setErr]=useState("");
  const[show,setShow]=useState(false);
  const[checking,setChecking]=useState(false);
  const accs=manifest?.accounts||[];
  const[attempts,setAttempts]=useState(0);
  const[lockUntil,setLockUntil]=useState(0);

  const check=async()=>{
    if(pw.length<6){setErr("Password troppo corta");setChecking(false);return;}
    if(!user.trim()||!pw)return;
    if(Date.now()<lockUntil){setErr(`Troppi tentativi. Riprova tra ${Math.ceil((lockUntil-Date.now())/1000)}s`);return;}
    setChecking(true);
    const found=accs.find(a=>a.name.toLowerCase()===user.trim().toLowerCase()||a.id===user.trim().toLowerCase());
    if(!found){setErr("Utente non trovato");setChecking(false);return;}
    const hashed=await H(pw+"$ttrpg-op-2026$");
    const dh=await H(hashed);
    if(dh===found.ix){setErr("");onAuth(found.id,hashed);}
    else{const n=attempts+1;setAttempts(n);if(n>=5){setLockUntil(Date.now()+60000);setAttempts(0);setErr("Troppi tentativi. Bloccato per 60s");}else{setErr(`Password errata (${5-n} tentativi rimasti)`);}}
    setChecking(false);
  };

  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"var(--app-h)",background:"linear-gradient(180deg,#0a0e17,#111827,#0f1420)",padding:"0 20px",overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
      <div style={{textAlign:"center",maxWidth:320,width:"100%",padding:"40px 0"}}>
        <h1 style={{fontFamily:"'Cinzel'",fontSize:26,fontWeight:900,color:"#c8a95e",marginBottom:4,letterSpacing:2,textShadow:"0 2px 20px rgba(200,169,94,0.3)"}}>🎲 TTRPG App</h1>
        <p style={{color:"#665a3e",fontSize:13,marginBottom:32}}>Accedi al tuo account</p>
        <input value={user} onChange={e=>{setUser(e.target.value);setErr("");}} placeholder="Nome utente..." onKeyDown={e=>e.key==="Enter"&&check()} style={{...SS.inp,width:"100%",fontSize:15,textAlign:"center",padding:"12px 16px",letterSpacing:0.5,marginBottom:10}}/>
        <div style={{position:"relative",marginBottom:16}}>
          <input type={show?"text":"password"} value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&check()} placeholder="Password..." style={{...SS.inp,width:"100%",fontSize:15,textAlign:"center",padding:"12px 44px 12px 16px",letterSpacing:1}}/>
          <button onClick={()=>setShow(!show)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#665a3e",fontSize:16,cursor:"pointer"}}>{show?"🙈":"👁"}</button>
        </div>
        {err&&<p style={{color:"#e74c3c",fontSize:13,marginBottom:12,fontFamily:"'Cinzel'"}}>{err}</p>}
        <button onClick={check} disabled={checking} style={{...SS.bg,width:"100%",padding:"12px 0",fontSize:15,borderColor:"#c8a95e66",color:"#c8a95e",opacity:checking?0.5:1}}>
          {checking?"Verifica...":"Entra"}
        </button>
        {!BASE()&&<p style={{textAlign:"center",fontSize:10,color:"#e74c3c66",marginTop:16}}>⚠️ GitHub URL non configurato — modalità offline</p>}
      </div>
    </div>
  );
}

/* ═══ CHARACTER SHEET — FIX PRINCIPALE ═══ */
function Sheet({char:c,up,ac,acc,charMeta,ghToken,saveToGH,saveNewToGH,setCharMeta,accId,isMaster,onBack,onExport,onImport}){
  const[tab,setTab]=useState("stats");
  const[edit,setEdit]=useState(false);
  const[popup,setPopup]=useState(null);
  const[modal,setModal]=useState(null);
  const[avZoom,setAvZoom]=useState(false);
  const avUpRef=useRef(null);
  const[avKey,setAvKey]=useState(0);
  const uploadAvatar=async(e)=>{
    const file=e.target.files[0];if(!file||!ghToken||!charMeta)return;
    const reader=new FileReader();
    reader.onload=async(ev)=>{
      const b64=ev.target.result.split(",")[1];
      if(!acc?.isMaster&&charMeta.owner!==accId){alert("Non puoi modificare foto di altri account");return;}
      const path=`data/${charMeta.owner}/${charMeta.file.replace(/\.json$/,"")}.jpg`;
      const u=new URL(BASE());const user=u.hostname.split(".")[0];const repo=u.pathname.replace(/^\/|\/$/g,"");
      const api=`https://api.github.com/repos/${user}/${repo}/contents/${path}`;
      const hd={"Authorization":`token ${ghToken}`,"Accept":"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"};
      let sha=null;
      try{const r=await fetch(api+"?t="+Date.now(),{headers:{...hd,"If-None-Match":""},cache:"no-store"});if(r.ok){const j=await r.json();sha=j.sha;}}catch{}
      const body={message:`Upload avatar ${path}`,content:b64};
      if(sha)body.sha=sha;
      const res=await fetch(api,{method:"PUT",headers:{...hd,"Content-Type":"application/json"},body:JSON.stringify(body)});
      if(res.ok)setAvKey(k=>k+1);
      if(res.ok)ghLog(charMeta.owner,"Upload avatar",ghToken,accId,acc?.isMaster,acc?.name);
      else alert("Errore upload foto");
    };
    reader.readAsDataURL(file);
    e.target.value="";
  };
  const[saving,setSaving]=useState(false);
  const[saveOk,setSaveOk]=useState(null);
  const log=c.diceLog||[];
  const addLog=useCallback(e=>up({diceLog:[e,...(c.diceLog||[])].slice(0,80)}),[c.diceLog,up]);
  const mk20=cfg=>({...cfg,id:Date.now(),roll1:d20(),roll2:d20(),modifier:cfg.modifier||0,mode:null,chosen:null,total:null});
  const mkD=cfg=>{const r=rollDice(cfg.formula);return{...cfg,id:Date.now(),rollResult:r,total:r.total};};
  const oR=useCallback(cfg=>setPopup(cfg.type==="d20"?mk20(cfg):mkD(cfg)),[]);
  const rr=useCallback(()=>setPopup(p=>p?(p.type==="d20"?mk20(p):mkD(p)):null),[]);
  const pM=useCallback(m=>setPopup(p=>{if(!p)return null;const ch=m==="vantaggio"?Math.max(p.roll1,p.roll2):m==="svantaggio"?Math.min(p.roll1,p.roll2):p.roll1;return{...p,mode:m,chosen:ch,total:ch+p.modifier};}),[]);
  const aR=useCallback(()=>{if(!popup||(popup.type==="d20"&&!popup.mode))return;addLog({type:popup.type,label:popup.label,total:popup.total,roll1:popup.roll1,roll2:popup.roll2,chosen:popup.chosen,modifier:popup.modifier,mode:popup.mode,isNat20:popup.type==="d20"&&popup.chosen===20,isNat1:popup.type==="d20"&&popup.chosen===1,rollResult:popup.rollResult,cdTarget:popup.cdTarget,timestamp:Date.now()});setPopup(null);},[popup,addLog]);

  const avatarUrl=charMeta?charAvatarUrl(charMeta.owner,charMeta.file):null;
  const htmlUrl=charMeta?charHtmlUrl(charMeta.owner,charMeta.file):null;

  useEffect(()=>{if(accId&&c)saveSession(accId,c);},[c,accId]);
  const doSave=async()=>{
    if(!ghToken){onExport();return;}
    setSaving(true);setSaveOk(null);
    let ok;
    if(charMeta){
      ok=await saveToGH(charMeta.owner,charMeta.file,c);
      if(ok&&ghToken){try{const b=BASE();const mRaw=await fetch(`${b}/data/manifest.json?t=`+Date.now()).then(r=>r.json());const list=mRaw.characters[charMeta.owner]||[];const entry=list.find(x=>x.file===charMeta.file);if(entry){const newName=c.name||entry.name;const newPrev=`${c.race||"?"} · Lv ${c.level||1}${c.classes?" · "+c.classes:""}`;if(entry.name!==newName||entry.preview!==newPrev){entry.name=newName;entry.preview=newPrev;await ghPut("data/manifest.json",JSON.stringify(mRaw,null,2),ghToken,accId,acc?.isMaster,acc?.name);setManifest(mRaw);}}}catch{}}
    }else{
      const res=await saveNewToGH(c);
      ok=!!res;
      if(res)setCharMeta(res);
    }
    setSaving(false);setSaveOk(ok);
    if(!ok)onExport();
    setTimeout(()=>setSaveOk(null),2500);
  };

  useEffect(()=>{
    if(tab!=="export")return;
    if(ghToken){
      doSave().then(()=>setTimeout(()=>setTab("stats"),2000));
    }else{
      onExport();
      setSaveOk(true);
      setTimeout(()=>{setSaveOk(null);setTab("stats");},1500);
    }
  },[tab]);

  /* 
    FIX LAYOUT MOBILE:
    - Il container usa height: var(--app-h) invece di 100vh
    - La nav è position:fixed con padding-bottom per safe area (iPhone notch)
    - Il contenuto scrollabile ha padding-bottom pari all'altezza della nav
    - Il wrapper header è sticky per non sparire
  */
  const NAV_HEIGHT = 56; // px visivi della nav

  return(
    <div style={{
      position:"relative",
      maxWidth:window.innerWidth>=768?"min(100%, 1000px)":"480px",
      margin:"0 auto",
      height:"var(--app-h)",
      display:"flex",
      flexDirection:"column",
      overflow:"hidden",
      background:"linear-gradient(180deg,#0a0e17,#111827,#0f1420)"
    }}>
      {/* HEADER — fisso in cima */}
      <div style={{
        flexShrink:0,
        background:`linear-gradient(180deg,${ac}11,transparent)`,
        borderBottom:`1px solid ${ac}22`,
        padding:"10px 14px 8px"
      }}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
            <button onClick={onBack} style={{...SS.bb,borderColor:ac+"44",color:ac,width:28,height:28,fontSize:12}}>←</button>
            <input ref={avUpRef} type="file" accept="image/jpeg,image/png" style={{display:"none"}} onChange={uploadAvatar}/>
            {avatarUrl?<div onClick={()=>setAvZoom(true)} style={{cursor:"pointer"}}><Av key={avKey} src={avatarUrl+"?t="+avKey} fallback={c.name?c.name[0]:"?"} size={34} color={ac} round={false}/></div>
            :<div onClick={()=>{if(ghToken&&charMeta)avUpRef.current?.click();}} style={{width:34,height:34,borderRadius:8,border:`2px dashed ${ac}44`,background:`${ac}0a`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,cursor:ghToken&&charMeta?"pointer":"default",flexShrink:0,color:ac+"66"}}>📷</div>}
            <div style={{flex:1,minWidth:0}}>
              {edit?(
                <div style={{display:"flex",flexDirection:"column",gap:3}}>
                  <input value={c.name} onChange={e=>up({name:e.target.value})} style={{...SS.inp,fontFamily:"'Cinzel'",fontSize:15,fontWeight:900,color:ac}}/>
                  <div style={{display:"flex",gap:3}}>
                    <input value={c.race} onChange={e=>up({race:e.target.value})} placeholder="Razza" style={{...SS.inp,flex:1,fontSize:10}}/>
                    <input type="number" value={c.level} onChange={e=>up({level:parseInt(e.target.value)||1})} style={{...SS.inp,width:34,fontSize:10,textAlign:"center"}}/>
                  </div>
                  <input value={c.classes} onChange={e=>up({classes:e.target.value})} placeholder="Classi" style={{...SS.inp,fontSize:10}}/>
                </div>
              ):(
                <>
                  <h1 style={{fontFamily:"'Cinzel'",fontSize:17,fontWeight:900,color:ac,margin:0,letterSpacing:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name||"Senza Nome"}</h1>
                  <p style={{fontSize:10,color:"#998866"}}>{c.race?`${c.race} · `:""}Lv {c.level}{c.classes?` · ${c.classes}`:""}</p>
                </>
              )}
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
            <span style={{fontSize:9,color:ac+"88",fontFamily:"'Cinzel'"}}>{acc?.name}</span>
            {htmlUrl&&<button onClick={()=>window.open(htmlUrl,"_blank")} title="Scheda Completa" style={{width:28,height:28,borderRadius:"50%",border:`1.5px solid ${ac}44`,background:`${ac}15`,color:ac,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,cursor:"pointer",flexShrink:0}}>📖</button>}
            {isMaster&&<button onClick={()=>up({locked:!c.locked})} style={{width:28,height:28,borderRadius:"50%",border:`1.5px solid ${c.locked?"#e74c3c":ac+"44"}`,background:c.locked?"rgba(231,76,60,0.2)":`${ac}15`,color:c.locked?"#e74c3c":ac,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,cursor:"pointer",flexShrink:0}}>{c.locked?"🔒":"🔓"}</button>}
            {(!c.locked||isMaster)&&<button onClick={()=>setEdit(!edit)} style={{width:28,height:28,borderRadius:"50%",border:`1.5px solid ${edit?"#e74c3c":ac+"44"}`,background:edit?"rgba(231,76,60,0.3)":`${ac}15`,color:edit?"#e74c3c":ac,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,cursor:"pointer",flexShrink:0}}>{edit?"✕":"✎"}</button>}
          </div>
        </div>
        <HPBar c={c} up={up} edit={edit} ac={ac}/>
        <div style={{display:"flex",gap:4,marginTop:8}}>
          {[{l:"CA",k:"ac"},{l:"Vel.",k:"speed"},{l:"Perc.",k:"passivePerception"},{l:"Comp.",k:"profBonus"}].map(i=>(

              {edit
                ?<input type="number" value={c[i.k]} onChange={e=>up({[i.k]:parseInt(e.target.value)||0})} style={{...SS.inp,width:36,textAlign:"center",fontSize:14,fontWeight:700,fontFamily:"'JetBrains Mono'",color:ac,padding:"1px 2px"}}/>
                :<span style={{fontSize:15,fontWeight:700,color:ac,fontFamily:"'JetBrains Mono'"}}>{i.k==="profBonus"?`+${c[i.k]}`:c[i.k]}</span>
              }
            </div>
          ))}
        </div>
      </div>

      {/* CONTENUTO SCROLLABILE — flex:1 con overflow */}
      <div style={{
        flex:1,
        overflowY:"auto",
        WebkitOverflowScrolling:"touch",
        paddingBottom:`calc(${NAV_HEIGHT}px + var(--safe-bottom) + 8px)`

        {tab==="stats"&&<STab c={c} up={up} edit={edit} oR={oR} sM={setModal} ac={ac}/>}

      </div>

      {/* BOTTOM NAV — position absolute rispetto al container, non fixed globale */}
      <nav style={{

/* ═══ HP BAR ═══ */
function HPBar({c,up,edit,ac}){
  const eM=effMax(c),pct=eM>0?Math.max(0,(c.hpCurrent/eM)*100):0,hc=pct>60?"#2ecc71":pct>30?"#f39c12":"#e74c3c";
  return(
    <div style={{marginTop:8}}>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
        <span style={{fontFamily:"'Cinzel'",fontSize:9,fontWeight:700,color:"#998866",letterSpacing:2}}>HP</span>
        {edit?(
          <div style={{display:"flex",alignItems:"center",gap:3}}>
            <input type="number" value={c.hpCurrent} onChange={e=>up({hpCurrent:Math.min(parseInt(e.target.value)||0,eM)})} style={{width:40,background:"rgba(200,169,94,0.08)",border:"1px solid #c8a95e33",borderRadius:5,color:hc,fontFamily:"'JetBrains Mono'",fontSize:15,padding:"1px 3px",textAlign:"center"}}/>
            <span style={{color:"#665a3e"}}>/</span>
            <input type="number" value={c.hpMax} onChange={e=>up({hpMax:parseInt(e.target.value)||1})} style={{width:40,background:"rgba(200,169,94,0.08)",border:"1px solid #c8a95e33",borderRadius:5,color:"#e8dcc8",fontFamily:"'JetBrains Mono'",fontSize:15,padding:"1px 3px",textAlign:"center"}}/>
          </div>
        ):(
          <span style={{fontFamily:"'JetBrains Mono'",fontSize:17,fontWeight:600,color:hc}}>{c.hpCurrent}<span style={{color:"#665a3e"}}>/{eM}</span></span>
        )}
        {c.hpTemp>0&&<span style={{fontSize:10,color:"#3498db",fontFamily:"'JetBrains Mono'",background:"rgba(52,152,219,0.12)",padding:"0 4px",borderRadius:3}}>+{c.hpTemp}t</span>}
        {c.hpPerm>0&&<span style={{fontSize:10,color:"#e74c3c",fontFamily:"'JetBrains Mono'",background:"rgba(231,76,60,0.12)",padding:"0 4px",borderRadius:3}}>-{c.hpPerm}p</span>}
      </div>
      <div style={{height:5,background:"#1a1f2e",borderRadius:3,overflow:"hidden"}}>
        <div style={{height:"100%",borderRadius:3,width:`${pct}%`,background:`linear-gradient(90deg,${hc}cc,${hc})`,transition:"width 0.4s"}}/>
      </div>
      {!edit&&(
        <>
          <div style={{display:"flex",gap:3,marginTop:5}}>
            {[-10,-5,-1,1,5,10].map(n=>(
              <button key={n} onClick={()=>{if(n>0)up({hpCurrent:Math.min(c.hpCurrent+n,eM)});else{const d=Math.abs(n);if(c.hpTemp>=d)up({hpTemp:c.hpTemp-d});else up({hpTemp:0,hpCurrent:Math.max(0,c.hpCurrent-(d-c.hpTemp))});}}}
                style={{flex:1,padding:"4px 0",borderRadius:5,border:"1px solid",cursor:"pointer",fontFamily:"'JetBrains Mono'",fontSize:11,fontWeight:600,background:n>0?"rgba(46,204,113,0.1)":"rgba(231,76,60,0.1)",color:n>0?"#2ecc71":"#e74c3c",borderColor:n>0?"#2ecc7133":"#e74c3c33",touchAction:"manipulation"}}>
                {n>0?`+${n}`:n}
              </button>
            ))}
          </div>
          <div style={{display:"flex",gap:6,marginTop:5}}>
            {[{l:"TEMP",v:c.hpTemp,c:"#3498db",set:v=>up({hpTemp:Math.max(0,v)})},{l:"PERM",v:c.hpPerm,c:"#e74c3c",set:v=>{const np=Math.max(0,v);up({hpPerm:np,hpCurrent:Math.min(c.hpCurrent,Math.max(0,c.hpMax-np))});}}].map(h=>(
              <div key={h.l} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",background:"rgba(200,169,94,0.04)",borderRadius:5,padding:"4px 2px",border:"1px solid #c8a95e10"}}>
                <span style={{fontSize:7,color:"#665a3e",letterSpacing:1,fontFamily:"'Cinzel'",fontWeight:700,marginBottom:2}}>{h.l}</span>
                <div style={{display:"flex",alignItems:"center",gap:3}}>
                  <button onClick={()=>h.set(h.v-10)} style={{...SS.hs,width:28,height:28,fontSize:9,color:h.c,touchAction:"manipulation"}}>-10</button>
                  <button onClick={()=>h.set(h.v-1)} style={{...SS.hs,width:28,height:28,fontSize:14,color:h.c,touchAction:"manipulation"}}>−</button>
                  <input type="number" value={h.v} onChange={e=>h.set(parseInt(e.target.value)||0)} style={{width:34,textAlign:"center",fontFamily:"'JetBrains Mono'",fontSize:15,fontWeight:700,color:h.c,background:"transparent",border:"none",outline:"none"}}/>
                  <button onClick={()=>h.set(h.v+1)} style={{...SS.hs,width:28,height:28,fontSize:14,color:h.c,touchAction:"manipulation"}}>+</button>
                  <button onClick={()=>h.set(h.v+10)} style={{...SS.hs,width:28,height:28,fontSize:9,color:h.c,touchAction:"manipulation"}}>+10</button>
                </div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

/* ═══ DICE POPUP ═══ */

        {is20&&(

            <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:10}}>
              {[p.roll1,p.roll2].map((v,i)=>(

                <button key={m} onClick={()=>oM(m)} style={{flex:1,padding:"6px 0",borderRadius:6,fontSize:10,fontWeight:700,fontFamily:"'Cinzel'",cursor:"pointer",textAlign:"center",border:`1.5px solid ${p.mode===m?c:c+"33"}`,background:p.mode===m?c+"25":"transparent",color:p.mode===m?c:c+"88",touchAction:"manipulation"}}>{l}</button>

            </div>
            {hp&&(
              <div style={{textAlign:"center",marginBottom:10}}>
                <span style={{fontSize:50,fontWeight:900,fontFamily:"'JetBrains Mono'",color:n20?"#f1c40f":n1?"#e74c3c":"#e8dcc8",textShadow:n20?"0 0 20px #f1c40f55":n1?"0 0 20px #e74c3c55":"0 2px 12px rgba(0,0,0,0.4)",display:"block",lineHeight:1.1}}>{p.total}</span>
                {p.modifier!==0&&<p style={{fontSize:11,color:"#998866",margin:"2px 0 0",fontFamily:"'JetBrains Mono'"}}>{p.chosen} {p.modifier>=0?"+":""}{p.modifier}</p>}
                {n20&&<p style={{color:"#f1c40f",fontFamily:"'Cinzel'",fontWeight:700,fontSize:12,margin:"4px 0 0"}}>★ CRITICO ★</p>}
                {n1&&<p style={{color:"#e74c3c",fontFamily:"'Cinzel'",fontWeight:700,fontSize:12,margin:"4px 0 0"}}>✗ FALLIMENTO ✗</p>}
                {p.cdTarget&&<p style={{fontSize:12,color:p.total>=p.cdTarget?"#2ecc71":"#e74c3c",fontFamily:"'JetBrains Mono'",margin:"6px 0 0",fontWeight:700}}>CD {p.cdTarget} → {p.total>=p.cdTarget?"✓":"✗"}</p>}

          <div style={{textAlign:"center",marginBottom:10}}>
            <span style={{fontSize:50,fontWeight:900,fontFamily:"'JetBrains Mono'",color:"#e8dcc8",display:"block",lineHeight:1.1}}>{p.total}</span>
            <p style={{fontSize:11,color:"#998866",margin:"4px 0 0",fontFamily:"'JetBrains Mono'"}}>[{p.rollResult.results.map(r=>r.value).join(", ")}]{p.rollResult.bonus?` ${p.rollResult.bonus>=0?"+":""}${p.rollResult.bonus}`:""}</p>

          <button onClick={oRR} style={{...SS.pb,background:"rgba(200,169,94,0.12)",borderColor:"#c8a95e44",color:"#c8a95e",touchAction:"manipulation"}}>Rilancia</button>

/* ═══ STAT TAB ═══ */
const SK_SORTS=[{id:"az",l:"A-Z"},{id:"mod",l:"Mod ↓"},{id:"prof",l:"Comp."}];
function SkillList({skills,stats,pb,ac,oR,sM}){
  const[sort,setSort]=useState("az");
  const indexed=skills.map((s,i)=>({...s,idx:i,_m:skMod(s,stats,pb),_p:normProf(s.prof)}));
  const sorted=sort==="mod"?[...indexed].sort((a,b)=>b._m-a._m):sort==="prof"?[...indexed].sort((a,b)=>{const w={mastery:2,prof:1,none:0};return(w[b._p]||0)-(w[a._p]||0)||a.name.localeCompare(b.name);}):[...indexed].sort((a,b)=>a.name.localeCompare(b.name));
  const pIcon=p=>p==="mastery"?"★ ":p==="prof"?"● ":"";
  return<>
    <div style={{display:"flex",gap:3,marginBottom:4}}>{SK_SORTS.map(s=><button key={s.id} onClick={()=>setSort(s.id)} style={{padding:"2px 7px",borderRadius:4,border:`1px solid ${sort===s.id?ac+"66":ac+"22"}`,background:sort===s.id?ac+"15":"transparent",color:sort===s.id?ac:"#665a3e",fontSize:9,fontFamily:"'Cinzel'",cursor:"pointer",fontWeight:sort===s.id?700:400}}>{s.l}</button>)}</div>
    <div style={{display:"flex",flexDirection:"column",gap:3}}>{sorted.map(s=>(
      <div key={s.idx} style={{display:"flex",alignItems:"center",gap:4}}>
        <button onClick={()=>oR({label:s.name,type:"d20",modifier:s._m})} style={{flex:1,display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:`${ac}06`,borderRadius:6,border:`1px solid ${ac}10`,cursor:"pointer",textAlign:"left",touchAction:"manipulation"}}>
          <span style={{fontSize:12,color:"#e8dcc8"}}><span style={{color:s._p==="mastery"?"#f1c40f":s._p==="prof"?ac:"transparent"}}>{pIcon(s._p)}</span>{s.name}{s.stat?<span style={{fontSize:9,color:"#665a3e",marginLeft:4}}>({s.stat})</span>:null}</span>
          <span style={{fontFamily:"'JetBrains Mono'",color:ac,fontWeight:600,fontSize:12}}>{s._m>=0?`+${s._m}`:s._m} 🎲</span>
        </button>
        <button onClick={()=>sM({type:"skill",data:{...s,idx:s.idx}})} style={{width:24,height:24,borderRadius:"50%",border:`1px solid ${ac}22`,background:`${ac}0a`,color:ac,fontSize:9,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✎</button>
      </div>
    ))}</div>
  </>;
}

function STab({c,up,edit,oR,sM,ac}){

  return(
    <div style={{padding:"12px 12px 20px",animation:"fadeIn 0.15s ease"}}>
      <Sec ac={ac}>Caratteristiche</Sec>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
        {Object.entries(c.stats).map(([k,v])=>(
          <div key={k} style={{display:"flex",flexDirection:"column",alignItems:"center",background:`${ac}0a`,borderRadius:7,padding:"7px 3px 5px",border:`1px solid ${ac}15`}}>
            <span style={{fontSize:9,fontWeight:700,color:"#998866",letterSpacing:2,fontFamily:"'Cinzel'"}}>{k}</span>
            {edit?(
              <>
                <input type="number" value={v.score} onChange={e=>uS(k,"score",parseInt(e.target.value)||0)} style={{...SS.inp,width:38,fontSize:17,textAlign:"center",fontWeight:700,fontFamily:"'JetBrains Mono'",color:"#e8dcc8",padding:"1px"}}/>
                <span style={{fontSize:11,color:ac,fontFamily:"'JetBrains Mono'",fontWeight:600}}>{v.mod>=0?`+${v.mod}`:v.mod}</span>
                <label style={{display:"flex",alignItems:"center",gap:2,fontSize:7,color:"#998866",cursor:"pointer",marginTop:2}}>
                  <input type="checkbox" checked={v.profSave} onChange={e=>uS(k,"profSave",e.target.checked)} style={{width:9,height:9,accentColor:ac}}/>Comp.TS
                </label>
              </>
            ):(
              <>
                <button onClick={()=>oR({label:`Prova ${k}`,type:"d20",modifier:v.mod})} style={{background:"none",border:"none",cursor:"pointer",padding:0,touchAction:"manipulation"}}>
                  <span style={{fontSize:20,fontWeight:700,color:"#e8dcc8",fontFamily:"'JetBrains Mono'",lineHeight:1.2,display:"block"}}>{v.score}</span>
                  <span style={{fontSize:11,color:ac,fontFamily:"'JetBrains Mono'",fontWeight:600,display:"block"}}>{v.mod>=0?`+${v.mod}`:v.mod} 🎲</span>
                </button>
                <button onClick={()=>oR({label:`TS ${k}`,type:"d20",modifier:v.save})} style={{marginTop:2,padding:"1px 5px",borderRadius:4,border:`1px solid ${ac}22`,background:`${ac}0d`,color:"#998866",fontSize:9,fontFamily:"'JetBrains Mono'",cursor:"pointer",touchAction:"manipulation"}}>TS {v.save>=0?`+${v.save}`:v.save} 🎲</button>
              </>
            )}
          </div>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <Sec ac={ac}>Abilità</Sec>
        <button onClick={()=>sM({type:"skill"})} style={{...SS.gn,padding:"4px 12px",fontSize:10}}>+ Nuova</button>
      </div>
      <SkillList skills={c.skills} stats={c.stats} pb={c.profBonus} ac={ac} oR={oR} sM={sM}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:14}}>
        <Sec ac={ac}>Attacchi</Sec>
        <button onClick={()=>sM({type:"attack"})} style={{...SS.gn,padding:"4px 12px",fontSize:10}}>+ Nuovo</button>
      </div>
      {c.attacks.map((a,idx)=>{const h=atkHit(a,c.stats,c.profBonus);const dmg=atkDmg(a,c.stats);return(
        <div key={a.id} style={{background:`${ac}0a`,borderRadius:7,padding:9,marginBottom:5,border:`1px solid ${ac}15`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <button onClick={()=>sM({type:"attack",data:a})} style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center",gap:4}}>
              <span style={{fontFamily:"'Cinzel'",fontWeight:700,fontSize:12,color:"#e8dcc8"}}>{a.name}</span>
              <span style={{fontSize:8,color:"#665a3e"}}>✎</span>
            </button>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <div style={{display:"flex",gap:2}}>
                {idx>0&&<button onClick={()=>{const atk=[...c.attacks];[atk[idx-1],atk[idx]]=[atk[idx],atk[idx-1]];up({attacks:atk});}} style={{width:20,height:20,borderRadius:4,border:`1px solid ${ac}22`,background:`${ac}0a`,color:ac,fontSize:9,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",touchAction:"manipulation"}}>↑</button>}
                {idx<c.attacks.length-1&&<button onClick={()=>{const atk=[...c.attacks];[atk[idx],atk[idx+1]]=[atk[idx+1],atk[idx]];up({attacks:atk});}} style={{width:20,height:20,borderRadius:4,border:`1px solid ${ac}22`,background:`${ac}0a`,color:ac,fontSize:9,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",touchAction:"manipulation"}}>↓</button>}
              </div>
              {(a.bonusHit||a.bonusDmg)?<button onClick={()=>up({attacks:c.attacks.map(x=>x.id===a.id?{...x,bonusActive:!x.bonusActive}:x)})} style={{padding:"2px 6px",borderRadius:4,border:`1.5px solid ${a.bonusActive?"#f39c12":"#f39c1233"}`,background:a.bonusActive?"rgba(243,156,18,0.15)":"transparent",color:a.bonusActive?"#f39c12":"#f39c1266",fontSize:8,fontFamily:"'Cinzel'",fontWeight:700,cursor:"pointer",touchAction:"manipulation"}}>{a.bonusActive?"⚡ON":"⚡OFF"}</button>:null}
              <span style={{fontSize:9,color:"#998866",fontStyle:"italic"}}>{a.stat||""} · {a.type}</span>
            </div>
          </div>
          <div style={{display:"flex",gap:5,marginTop:5}}>
            <button onClick={()=>oR({label:`${a.name} (colpire)`,type:"d20",modifier:h})} style={{...SS.gn,flex:1,padding:"6px 0",fontSize:10,touchAction:"manipulation"}}>+{h} 🎲</button>
            <button onClick={()=>oR({label:`${a.name} (danno)`,type:"damage",formula:dmg})} style={{...SS.rd,flex:1,padding:"6px 0",fontSize:10,touchAction:"manipulation"}}>{dmg} 🎲</button>
          </div>
          {a.desc&&<p style={{fontSize:10,color:"#bfb49a",marginTop:4,lineHeight:1.3,whiteSpace:"pre-line"}}>{a.desc}</p>}
        </div>
      );})}
    </div>
  );
}

/* ═══ EFFECTS TRACKER ═══ */
function EfxTracker({effects,onChange,ac}){
  const[adding,setAdding]=useState(false);const[nm,setNm]=useState("");const[rd,setRd]=useState(10);
  const add=()=>{if(!nm.trim())return;onChange([...effects,{id:uid(),name:nm.trim(),rounds:parseInt(rd)||1}]);setNm("");setRd(10);setAdding(false);};
  const dec=id=>onChange(effects.map(e=>e.id===id?{...e,rounds:Math.max(0,e.rounds-1)}:e));
  const inc=id=>onChange(effects.map(e=>e.id===id?{...e,rounds:e.rounds+1}:e));
  const rm=id=>onChange(effects.filter(e=>e.id!==id));
  if(!effects.length&&!adding)return<button onClick={()=>setAdding(true)} style={{width:"100%",padding:"6px 0",marginBottom:8,borderRadius:6,border:`1px dashed ${ac}33`,background:"transparent",color:ac+"88",fontSize:10,fontFamily:"'Cinzel'",cursor:"pointer"}}>+ Effetto / Concentrazione</button>;
  return(<div style={{marginBottom:10}}>
    {effects.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:adding?6:0}}>
      {effects.map(e=><div key={e.id} style={{display:"flex",alignItems:"center",gap:3,padding:"3px 6px 3px 8px",borderRadius:6,background:e.rounds===0?"rgba(231,76,60,0.12)":"rgba(200,169,94,0.08)",border:`1px solid ${e.rounds===0?"#e74c3c44":ac+"22"}`}}>
        <span style={{fontSize:10,color:e.rounds===0?"#e74c3c":"#e8dcc8",fontFamily:"'Cinzel'",fontWeight:600,maxWidth:90,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.name}</span>
        <button onClick={()=>dec(e.id)} style={{width:18,height:18,borderRadius:"50%",border:"none",background:"rgba(231,76,60,0.15)",color:"#e74c3c",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>

      </div>)}

    </div>}

    </div>}
  </div>);
}

function ATab({c,up,sM,ac}){
  const sorted=sortAbs(c.abilities,c.origins),favs=sorted.filter(a=>a.fav);
  const uA=id=>up({abilities:c.abilities.map(a=>a.id===id?{...a,uses:a.uses+1}:a)});
  const rA=id=>up({abilities:c.abilities.map(a=>a.id===id?{...a,uses:Math.max(0,a.uses-1)}:a)});
  const tF=id=>up({abilities:c.abilities.map(a=>a.id===id?{...a,fav:!a.fav}:a)});
  const rest=t=>{let u={abilities:c.abilities.map(a=>{if(a.maxUses===-1)return a;if(t==="lungo")return{...a,uses:0};if(t==="breve"&&a.rest==="breve")return{...a,uses:0};return a;})};if(t==="lungo"){u.hpCurrent=c.hpMax;u.hpTemp=0;u.hpPerm=0;}up(u);};
  const groups=c.origins.map(o=>o.id).filter(oid=>sorted.some(a=>a.originId===oid));
  return(
    <div style={{padding:"12px 12px 20px",animation:"fadeIn 0.15s ease"}}>
      <div style={{display:"flex",gap:5,marginBottom:8}}>
        <button onClick={()=>rest("breve")} style={{flex:1,padding:"8px 0",borderRadius:7,border:"1px solid #f39c1233",background:"rgba(243,156,18,0.1)",color:"#f39c12",fontSize:11,fontWeight:700,fontFamily:"'Cinzel'",cursor:"pointer",touchAction:"manipulation"}}>☀️ R. Breve</button>
        <button onClick={()=>rest("lungo")} style={{flex:1,padding:"8px 0",borderRadius:7,border:"1px solid #3498db33",background:"rgba(52,152,219,0.15)",color:"#3498db",fontSize:11,fontWeight:700,fontFamily:"'Cinzel'",cursor:"pointer",touchAction:"manipulation"}}>🌙 R. Lungo</button>
      </div>
      <EfxTracker effects={c.effects||[]} onChange={fx=>up({effects:fx})} ac={ac}/>
      <div style={{display:"flex",gap:5,marginBottom:12}}>
        <button onClick={()=>sM({type:"ability"})} style={{...SS.gn,padding:"5px 12px",fontSize:10}}>+ Azione</button>
        <button onClick={()=>sM({type:"origins"})} style={{...SS.bg,padding:"5px 12px",fontSize:10}}>⚙ Provenienze</button>
      </div>
      {favs.length>0&&(
        <>
          <div style={{borderLeft:`3px solid ${ac}`,paddingLeft:7,marginBottom:5}}>
            <span style={{color:ac,fontFamily:"'Cinzel'",fontWeight:700,fontSize:11,letterSpacing:1}}>★ PREFERITI</span>
          </div>
          {favs.map(a=><AbC key={a.id+"f"} a={a} c={c} u={uA} r={rA} t={tF} e={d=>sM({type:"ability",data:d})}/>)}
          <div style={{height:10}}/>
        </>
      )}
      {groups.map(oid=>{
        const or=c.origins.find(o=>o.id===oid),abs=sorted.filter(a=>a.originId===oid),cdA=abs.find(a=>a.cdStat),cd=cdA?(cdA.cdStat==="custom"?cdA.cdCustom||null:calcCD(c.profBonus,c.stats,cdA.cdStat)):null;
        return(
          <div key={oid} style={{marginBottom:14}}>
            <div style={{borderLeft:`3px solid ${or?.color||ac}`,paddingLeft:7,marginBottom:5,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:or?.color||ac,fontFamily:"'Cinzel'",fontWeight:700,fontSize:11,letterSpacing:1}}>{(or?.name||"?").toUpperCase()}</span>
              {cd&&<span style={{fontSize:11,color:"#fff",fontFamily:"'JetBrains Mono'",fontWeight:700,background:"linear-gradient(135deg,rgba(200,169,94,0.3),rgba(200,169,94,0.15))",padding:"2px 7px",borderRadius:4,border:"1.5px solid #c8a95e88"}}>CD {cd}</span>}
            </div>
            {abs.map(a=><AbC key={a.id} a={a} c={c} u={uA} r={rA} t={tF} e={d=>sM({type:"ability",data:d})}/>)}
          </div>
        );
      })}
    </div>
  );
}

  const lim=a.maxUses>0,used=lim&&a.uses>=a.maxUses,cd=a.cdStat==="custom"?a.cdCustom||null:a.cdStat?calcCD(c.profBonus,c.stats,a.cdStat):null,oc=oColor(c.origins,a.originId);

    <div style={{background:`${oc}08`,borderRadius:7,padding:9,marginBottom:4,border:`1px solid ${oc}90`,opacity:used?0.4:1}}>

            <button onClick={()=>e(a)} style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center",gap:3}}>

              <span style={{fontSize:7,color:"#665a3e"}}>✎</span>
            </button>
            <span style={{fontSize:8,color:"#998866",fontFamily:"'JetBrains Mono'",background:"rgba(200,169,94,0.1)",padding:"0 4px",borderRadius:3}}>{a.type}</span>
            {cd&&<span style={{fontSize:8,color:"#f1c40f",fontFamily:"'JetBrains Mono'",fontWeight:700,background:"rgba(241,196,15,0.12)",padding:"0 4px",borderRadius:3,border:"1px solid #f1c40f44"}}>CD {cd}</span>}
          </div>
          <p style={{fontSize:11,color:"#bfb49a",lineHeight:1.4,margin:"2px 0 0",whiteSpace:"pre-line"}}>{a.desc}</p>
        </div>

          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:40}}>
            <div style={{display:"flex",gap:2}}>
              {Array.from({length:a.maxUses}).map((_,i)=>(
                <div key={i} style={{width:10,height:10,borderRadius:"50%",background:i<a.uses?"#22222288":oc,border:`1.5px solid ${i<a.uses?"#44444466":oc}`}}/>
              ))}
            </div>
            <span style={{fontSize:7,color:"#665a3e"}}>{a.rest==="breve"?"R.BREVE":"R.LUNGO"}</span>
          </div>
        )}
      </div>
      {lim&&(
        <div style={{display:"flex",gap:4,marginTop:5}}>
          {!used&&<button onClick={()=>u(a.id)} style={{flex:2,padding:"4px 0",borderRadius:5,border:`1px solid ${oc}44`,background:`${oc}0d`,color:oc,fontSize:10,fontWeight:700,fontFamily:"'Cinzel'",cursor:"pointer",textAlign:"center",touchAction:"manipulation"}}>Usa</button>}
          {a.uses>0&&<button onClick={()=>r(a.id)} style={{flex:1,padding:"4px 0",borderRadius:5,border:"1px solid #2ecc7144",background:"rgba(46,204,113,0.06)",color:"#2ecc71",fontSize:9,fontWeight:700,cursor:"pointer",textAlign:"center",touchAction:"manipulation"}}>↺</button>}
        </div>
      )}
    </div>
  );
}

/* ═══ DICE TAB ═══ */

  const rl=()=>{const b=cf.trim()||"1d20",f=b+(cm?(cm>=0?`+${cm}`:`${cm}`):"");if(b.toLowerCase().includes("d20"))oR({label:f,type:"d20",modifier:cm});else oR({label:f,type:"damage",formula:f});};
  return(
    <div style={{padding:"12px 12px 20px",animation:"fadeIn 0.15s ease"}}>

      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginBottom:8}}>

            <span style={{fontFamily:"'Cinzel'",fontSize:15,fontWeight:900,color:ac}}>d{d}</span>

      <div style={{background:`${ac}06`,borderRadius:7,padding:9,border:`1px solid ${ac}15`,marginBottom:12}}>
        <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:5}}>
          {[4,6,8,10,12,20].map(s=>(
            <button key={s} onClick={()=>aD(s)} style={{padding:"4px 9px",borderRadius:4,border:`1.5px solid ${ac}33`,background:`${ac}0a`,color:ac,fontSize:10,fontWeight:700,fontFamily:"'JetBrains Mono'",cursor:"pointer",touchAction:"manipulation"}}>+d{s}</button>
          ))}
          <button onClick={()=>sCf("")} style={{padding:"4px 9px",borderRadius:4,border:"1.5px solid #e74c3c33",color:"#e74c3c",fontSize:10,cursor:"pointer",background:"transparent"}}>✕</button>
        </div>

        <div style={{display:"flex",gap:5,alignItems:"center",marginBottom:5}}>
          <span style={{color:"#665a3e",fontSize:10,fontFamily:"'Cinzel'"}}>Mod.</span>

        </div>
        <button onClick={rl} style={{...SS.bg,width:"100%",padding:"10px 0",fontSize:13,borderColor:ac+"55",color:ac}}>Tira 🎲</button>
      </div>
      <Sec ac={ac}>Dado Vita</Sec>
      <div style={{display:"flex",gap:5,alignItems:"center",marginBottom:12}}>

        <button onClick={()=>{const co=c.stats.COS?.mod||0,f=c.hitDie+(co>=0?`+${co}`:`${co}`);oR({label:`DV (${f})`,type:"damage",formula:f});}} style={{...SS.bg,flex:1,padding:"8px 0",fontSize:11,borderColor:ac+"55",color:ac}}>Dado Vita 🎲</button>

      </div>
      <div style={{maxHeight:280,overflowY:"auto"}}>

/* ═══ SPELLS TAB ═══ */
const SCHOOLS=["Abiurazione","Ammaliamento","Divinazione","Evocazione","Illusione","Invocazione","Necromanzia","Trasmutazione"];
const CT_OPTS=["action","bonus","reaction","1 minuto","10 minuti","1 ora","8 ore","24 ore","ritual"];
const ctLabel=v=>v==="action"?"Azione":v==="bonus"?"Bonus":v==="reaction"?"Reazione":v==="ritual"?"Rituale":v;

function SpTab({c,up,sM,ac}){
  const[filter,setFilter]=useState("prep");
  const ss=c.spellSlots||{cantrips:0,slots:{}};
  const spells=c.spells||[];
  const useSlot=(lv)=>{const ns={...ss,slots:{...ss.slots}};ns.slots[lv]={...ns.slots[lv],used:Math.min((ns.slots[lv]?.used||0)+1,ns.slots[lv]?.max||0)};up({spellSlots:ns});};
  const restoreSlot=(lv)=>{const ns={...ss,slots:{...ss.slots}};ns.slots[lv]={...ns.slots[lv],used:Math.max((ns.slots[lv]?.used||0)-1,0)};up({spellSlots:ns});};
  const restoreAll=()=>{const ns={...ss,slots:{...ss.slots}};Object.keys(ns.slots).forEach(k=>{ns.slots[k]={...ns.slots[k],used:0};});up({spellSlots:ns});};
  const activeSlots=Object.entries(ss.slots||{}).filter(([,v])=>v.max>0);
  const filtered=filter==="prep"?spells.filter(s=>s.prepared):spells;
  const grouped={};filtered.forEach(s=>{const k=s.level||0;if(!grouped[k])grouped[k]=[];grouped[k].push(s);});
  const lvKeys=Object.keys(grouped).map(Number).sort((a,b)=>a-b);

  return(
    <div style={{padding:"12px 12px 20px",animation:"fadeIn 0.15s ease"}}>
      {/* Spell Slots Bar */}
      {(activeSlots.length>0||ss.cantrips>0)&&<div style={{background:`${ac}08`,borderRadius:8,padding:"8px 10px",marginBottom:10,border:`1px solid ${ac}15`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{fontFamily:"'Cinzel'",fontSize:10,fontWeight:700,color:ac,letterSpacing:1}}>SLOT INCANTESIMO</span>
          <button onClick={restoreAll} style={{fontSize:9,color:"#3498db",background:"none",border:"none",cursor:"pointer",fontFamily:"'Cinzel'"}}>↺ Ripristina</button>
        </div>
        {ss.cantrips>0&&<div style={{fontSize:10,color:"#998866",marginBottom:4,fontFamily:"'JetBrains Mono'"}}>Trucchetti: {ss.cantrips}</div>}
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {activeSlots.map(([lv,v])=>{const avail=v.max-v.used;return(
            <div key={lv} style={{display:"flex",alignItems:"center",gap:3,padding:"3px 6px",borderRadius:5,background:avail===0?"rgba(231,76,60,0.1)":`${ac}0a`,border:`1px solid ${avail===0?"#e74c3c33":ac+"22"}`}}>
              <span style={{fontSize:9,color:"#998866",fontFamily:"'Cinzel'",fontWeight:700}}>Lv{lv}</span>
              <span style={{fontSize:12,fontFamily:"'JetBrains Mono'",fontWeight:700,color:avail===0?"#e74c3c":ac}}>{avail}<span style={{color:"#665a3e"}}>/{v.max}</span></span>
              <button onClick={()=>useSlot(lv)} disabled={avail===0} style={{width:18,height:18,borderRadius:"50%",border:"none",background:"rgba(231,76,60,0.15)",color:"#e74c3c",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:avail===0?0.3:1}}>−</button>
              <button onClick={()=>restoreSlot(lv)} disabled={v.used===0} style={{width:18,height:18,borderRadius:"50%",border:"none",background:"rgba(46,204,113,0.12)",color:"#2ecc71",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:v.used===0?0.3:1}}>+</button>
            </div>
          );})}
        </div>
      </div>}
      {/* Filter + Add */}
      <div style={{display:"flex",gap:5,marginBottom:10}}>
        <button onClick={()=>setFilter(f=>f==="prep"?"all":"prep")} style={{...SS.bg,padding:"5px 10px",fontSize:10,borderColor:ac+"44"}}>{filter==="prep"?"📖 Preparate":"📚 Tutte"}</button>
        <button onClick={()=>sM({type:"spell"})} style={{...SS.gn,padding:"5px 10px",fontSize:10}}>+ Magia</button>
        <button onClick={()=>sM({type:"spellSlots"})} style={{padding:"5px 10px",borderRadius:5,border:`1px solid ${ac}22`,background:"transparent",color:"#998866",fontSize:10,fontFamily:"'Cinzel'",cursor:"pointer"}}>⚙ Slot</button>
      </div>
      {/* Spell List */}
      {lvKeys.length===0&&<p style={{color:"#665a3e",fontStyle:"italic",textAlign:"center",fontSize:12,padding:"20px 0"}}>{filter==="prep"?"Nessuna magia preparata":"Nessuna magia nel libro"}</p>}
      {lvKeys.map(lv=>(
        <div key={lv} style={{marginBottom:12}}>
          <div style={{borderLeft:`3px solid ${lv===0?"#7f8c8d":ac}`,paddingLeft:7,marginBottom:5}}>
            <span style={{fontFamily:"'Cinzel'",fontWeight:700,fontSize:11,color:lv===0?"#7f8c8d":ac,letterSpacing:1}}>{lv===0?"TRUCCHETTI":`LIVELLO ${lv}`}</span>
          </div>
          {grouped[lv].map(sp=><SpCard key={sp.id} sp={sp} ac={ac} onEdit={()=>sM({type:"spell",data:sp})} onToggle={()=>{up({spells:spells.map(s=>s.id===sp.id?{...s,prepared:!s.prepared}:s)});}}/>)}
        </div>
      ))}
    </div>
  );
}

function SpCard({sp,ac,onEdit,onToggle}){
  const[open,setOpen]=useState(false);
  const comp=[sp.components?.v&&"V",sp.components?.s&&"S",sp.components?.m&&"M"].filter(Boolean).join(",");
  return(
    <div style={{background:"rgba(200,169,94,0.04)",borderRadius:7,padding:"8px 10px",marginBottom:4,border:`1px solid ${sp.prepared?ac+"22":"#33333366"}`,opacity:sp.prepared?1:0.5}}>
      <div style={{display:"flex",alignItems:"center",gap:6}} onClick={()=>setOpen(!open)}>
        <button onClick={e=>{e.stopPropagation();onToggle();}} style={{width:18,height:18,borderRadius:4,border:`1.5px solid ${sp.prepared?ac:ac+"44"}`,background:sp.prepared?ac+"25":"transparent",color:sp.prepared?ac:"#555",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{sp.prepared?"✓":""}</button>
        <div style={{flex:1,minWidth:0,cursor:"pointer"}}>
          <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
            <span style={{fontFamily:"'Cinzel'",fontWeight:700,fontSize:11,color:"#e8dcc8"}}>{sp.name}</span>
            {sp.concentration&&<span style={{fontSize:7,color:"#f39c12",background:"rgba(243,156,18,0.12)",padding:"0 3px",borderRadius:2,fontWeight:700}}>CONC</span>}
            {sp.ritual&&<span style={{fontSize:7,color:"#8e44ad",background:"rgba(142,68,173,0.12)",padding:"0 3px",borderRadius:2,fontWeight:700}}>RIT</span>}
          </div>
          <div style={{fontSize:9,color:"#665a3e",fontFamily:"'JetBrains Mono'"}}>{ctLabel(sp.castingTime)} · {sp.range} · {comp} · {sp.duration}</div>
        </div>
        <button onClick={e=>{e.stopPropagation();onEdit();}} style={{width:22,height:22,borderRadius:"50%",border:`1px solid ${ac}22`,background:`${ac}0a`,color:ac,fontSize:9,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✎</button>
      </div>

    <Fl l="Nome"><input value={nm} onChange={e=>setNm(e.target.value)} style={{...SS.inp,width:"100%"}} placeholder="es. Percezione"/></Fl>
    <Fl l="Caratteristica"><div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
      {["FOR","DES","COS","INT","SAG","CAR"].map(k=><button key={k} onClick={()=>setSt(k)} style={{padding:"4px 8px",borderRadius:4,border:`1.5px solid ${st===k?"#c8a95e":"#c8a95e22"}`,background:st===k?"rgba(200,169,94,0.15)":"transparent",color:st===k?"#c8a95e":"#998866",fontSize:10,fontFamily:"'Cinzel'",cursor:"pointer",fontWeight:st===k?700:400}}>{k}</button>)}
      <button onClick={()=>setSt("")} style={{padding:"4px 8px",borderRadius:4,border:`1.5px solid ${!st?"#3498db":"#3498db22"}`,background:!st?"rgba(52,152,219,0.12)":"transparent",color:!st?"#3498db":"#998866",fontSize:10,fontFamily:"'Cinzel'",cursor:"pointer"}}>Custom</button>
    </div></Fl>
    <Fl l="Competenza (tap per ciclare)"><button onClick={cyclePr} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",borderRadius:5,border:`1.5px solid ${prColor}66`,background:`${prColor}15`,color:prColor,fontSize:11,fontFamily:"'Cinzel'",cursor:"pointer",width:"100%",fontWeight:700}}>{prLabel}</button></Fl>
    {!st&&<Fl l="Modificatore Fisso"><input type="number" value={md} onChange={e=>setMd(parseInt(e.target.value)||0)} style={{...SS.inp,width:"100%"}}/></Fl>}
    <div style={{textAlign:"center",padding:"8px 0",fontFamily:"'JetBrains Mono'",fontSize:16,fontWeight:700,color:"#c8a95e"}}>Mod: {preview>=0?"+":""}{preview}</div>
    <div style={{display:"flex",gap:5,marginTop:8}}>{isE&&<button onClick={dl} style={{...SS.pb,background:"rgba(231,76,60,0.15)",borderColor:"#e74c3c44",color:"#e74c3c"}}>Elimina</button>}<button onClick={sv} style={{...SS.pb,flex:2,background:"rgba(46,204,113,0.15)",borderColor:"#2ecc71",color:"#2ecc71",fontWeight:700}}>Salva</button></div>
  </Sh>;
}

function Sec({ac,children}){
  return<h2 style={{fontFamily:"'Cinzel'",fontSize:11,fontWeight:700,color:ac||"#c8a95e",letterSpacing:2,textTransform:"uppercase",margin:"14px 0 8px",display:"inline-block"}}>{children}</h2>;
}

const SS={
  inp:{background:"rgba(200,169,94,0.08)",border:"1px solid #c8a95e33",borderRadius:5,color:"#e8dcc8",fontFamily:"'Crimson Text'",fontSize:12,padding:"5px 7px",outline:"none",boxSizing:"border-box"},
  bg:{borderRadius:7,border:"1.5px solid #c8a95e44",background:"rgba(200,169,94,0.1)",color:"#c8a95e",fontWeight:700,fontFamily:"'Cinzel'",cursor:"pointer",letterSpacing:0.5,textAlign:"center",fontSize:12},
  gn:{borderRadius:5,border:"1.5px solid #2ecc7144",background:"rgba(46,204,113,0.08)",color:"#2ecc71",fontWeight:700,fontFamily:"'Cinzel'",cursor:"pointer",textAlign:"center",fontSize:11},
  rd:{borderRadius:5,border:"1.5px solid #e74c3c44",background:"rgba(231,76,60,0.08)",color:"#e74c3c",fontWeight:700,fontFamily:"'Cinzel'",cursor:"pointer",textAlign:"center",fontSize:11},
  ac:{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:10,border:"1.5px solid",cursor:"pointer",width:"100%",textAlign:"left",background:"transparent"},
  bb:{width:32,height:32,borderRadius:"50%",border:"1.5px solid #c8a95e33",background:"rgba(200,169,94,0.08)",color:"#c8a95e",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,cursor:"pointer",flexShrink:0,fontWeight:700},
  hs:{width:22,height:22,borderRadius:"50%",border:"1px solid #c8a95e22",background:"rgba(200,169,94,0.08)",color:"#c8a95e",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700},
  po:{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",backdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:14},
  pc:{background:"linear-gradient(180deg,#151b2e,#0f1420)",border:"1.5px solid #c8a95e55",borderRadius:12,padding:"18px 16px 16px",width:"100%",maxWidth:320,boxShadow:"0 12px 48px rgba(0,0,0,0.6)"},
  pb:{flex:1,padding:"7px 0",borderRadius:7,border:"1.5px solid",fontSize:11,fontWeight:600,fontFamily:"'Cinzel'",cursor:"pointer",letterSpacing:0.5,textAlign:"center"},
};

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(AppWrapper));
</script>
</body>
</html>
