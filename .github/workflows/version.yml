name: Auto Version
on:
  push:
    paths: ['index.html']
    branches: [main]
jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          COUNT=$(git rev-list --count HEAD)
          sed -i "s/const APP_VERSION=\"v[^\"]*\"/const APP_VERSION=\"v${COUNT}\"/" index.html
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: version bump to v$(git rev-list --count HEAD)"
          file_pattern: index.html