<!DOCTYPE html>
<!--
  TEMPLATE SCHEDA PERSONAGGIO — Solo Visualizzazione
  Compatibile con JSON formato export: { account, character: {...} }
  e formato bare: { name, stats, ... }

  ISTRUZIONI:
  1. Copia questo file e rinominalo come il PG: nome_personaggio.html
  2. Sostituisci il blocco "const charData = { ... }" con i dati del JSON
  3. Se usi il formato export (con wrapper), incolla tutto — il template lo unwrappa
  4. Modifica getRacialTraits() per i tratti razziali (non sono nel JSON)
  5. Carica su GitHub nella cartella del giocatore
-->
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scheda Personaggio</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c14;--bg2:#0f1220;--bg3:#141828;--panel:#111525;--border:#2a3050;--border2:#1e2640;--gold:#c9a84c;--gold2:#e8c96a;--gold3:#7a5c1e;--teal:#3ab8b0;--teal2:#1e6e68;--text:#d4cbb8;--text2:#9a9070;--text3:#6a6050;--white:#f0ead8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;font-size:16px;line-height:1.6;min-height:100vh;background-image:radial-gradient(ellipse at 20% 10%,rgba(58,184,176,0.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(201,168,76,0.05) 0%,transparent 50%)}
.header{background:linear-gradient(180deg,#080b14,var(--bg2));border-bottom:1px solid var(--border);padding:2.5rem 2rem 2rem;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,0.08) 0%,transparent 60%);pointer-events:none}
.header-icon{font-size:2.8rem;margin-bottom:.4rem;filter:drop-shadow(0 0 12px rgba(201,168,76,0.5))}
.char-name{font-family:'Cinzel Decorative',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;color:var(--gold2);letter-spacing:.08em;text-shadow:0 0 30px rgba(201,168,76,0.4),0 2px 4px rgba(0,0,0,0.8);line-height:1.2}
.char-sub{font-family:'Cinzel',serif;font-size:.85rem;color:var(--teal);letter-spacing:.3em;text-transform:uppercase;margin-top:.4rem}
.hline{width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--gold3),var(--gold),var(--gold3),transparent);margin:1rem auto 0}
.badges{display:flex;justify-content:center;flex-wrap:wrap;gap:.5rem;margin-top:1rem}
.badge{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;padding:.25rem .75rem;border:1px solid var(--border);border-radius:2px;background:rgba(255,255,255,0.03);color:var(--text2)}
.body{max-width:1400px;margin:0 auto;padding:1.5rem;display:grid;grid-template-columns:280px 1fr;gap:1.5rem;align-items:start}
@media(max-width:900px){.body{grid-template-columns:1fr}}
.side,.main{display:flex;flex-direction:column;gap:1.2rem}
.panel{background:var(--panel);border:1px solid var(--border2);border-radius:4px;overflow:hidden;position:relative}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold3),transparent)}
.pt{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);padding:.65rem 1rem .5rem;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:.5rem;background:rgba(201,168,76,0.03)}
.pt::before{content:'';width:4px;height:4px;background:var(--gold);border-radius:50%;flex-shrink:0}
.pb{padding:1rem}
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem}
.cstat{background:var(--bg3);border:1px solid var(--border2);border-radius:3px;padding:.6rem .4rem;text-align:center}
.cstat .v{font-family:'Cinzel',serif;font-size:1.5rem;font-weight:700;line-height:1}
.cstat .l{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);margin-top:.2rem}
.cstat.ac .v{color:var(--teal)}.cstat.hp .v{color:#e74c3c}.cstat.sp .v{color:var(--gold)}
.hpbar{margin-top:.8rem;background:var(--bg3);border:1px solid var(--border2);border-radius:2px;height:8px;overflow:hidden}
.hpfill{height:100%;background:linear-gradient(90deg,#c0392b99,#e74c3c);border-radius:2px}
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem}
.sblk{background:var(--bg3);border:1px solid var(--border2);border-radius:3px;padding:.5rem .6rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.sblk .sn{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.sblk .sv{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:600;color:var(--white);line-height:1}
.sblk .sm{font-size:.75rem;color:var(--text2)}
.sblk .ss{font-size:.65rem;letter-spacing:.05em}
.sr{text-align:right}
.skl{display:flex;flex-direction:column;gap:.3rem}
.skr{display:flex;align-items:center;justify-content:space-between;padding:.25rem .4rem;border-radius:2px}
.skr:hover{background:rgba(255,255,255,0.03)}
.skr .kn{font-size:.85rem;color:var(--text);font-style:italic}
.skr .km{font-family:'Cinzel',serif;font-size:.8rem;font-weight:600;color:var(--gold);min-width:32px;text-align:right}
.atks{display:flex;flex-direction:column;gap:.5rem}
.atkc{background:var(--bg3);border:1px solid var(--border2);border-radius:3px;padding:.6rem .8rem;display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:.8rem}
.atkc:hover{border-color:var(--gold3)}
.an{font-family:'Cinzel',serif;font-size:.85rem;color:var(--white)}
.ah{font-family:'Cinzel',serif;font-size:.8rem;color:var(--teal);text-align:center}
.ah span{font-size:.6rem;display:block;color:var(--text3);letter-spacing:.1em}
.ad{font-family:'Cinzel',serif;font-size:.85rem;color:#e74c3c;text-align:right}
.ad span{font-size:.6rem;display:block;color:var(--text3);text-transform:capitalize}
.abg{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.7rem}
.abc{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:.75rem .9rem;position:relative;overflow:hidden;transition:border-color .2s,transform .15s,box-shadow .2s}
.abc:hover{border-color:var(--border);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.abt{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.4rem}
.abn{font-family:'Cinzel',serif;font-size:.82rem;font-weight:600;color:var(--white);line-height:1.3}
.abty{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;padding:.15rem .4rem;border-radius:2px;border:1px solid;white-space:nowrap;flex-shrink:0}
.t-pas{color:#7f8c8d;border-color:#2c3e50;background:rgba(127,140,141,0.1)}
.t-az{color:var(--teal);border-color:var(--teal2);background:rgba(58,184,176,0.07)}
.t-bon{color:var(--gold);border-color:var(--gold3);background:rgba(201,168,76,0.07)}
.t-rea{color:#e67e22;border-color:#7d4e0c;background:rgba(230,126,34,0.08)}
.t-rit{color:#8e44ad;border-color:#5a1e8c;background:rgba(142,68,173,0.1)}
.abd{font-size:.83rem;color:var(--text2);line-height:1.55;white-space:pre-line;font-family:'Crimson Pro',serif}
.abf{display:flex;align-items:center;justify-content:space-between;margin-top:.6rem;gap:.5rem}
.pips{display:flex;align-items:center;gap:.35rem}
.pip{width:10px;height:10px;border-radius:50%;border:1px solid var(--border);background:transparent}
.abr{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.abr.lungo{color:#8e44ad}.abr.breve{color:#e67e22}
.abcd{font-size:.62rem;color:var(--text3);letter-spacing:.08em}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border2);flex-wrap:wrap}
.tbtn{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;padding:.6rem 1rem;cursor:pointer;margin-bottom:-1px;transition:color .2s,border-color .2s}
.tbtn:hover{color:var(--text2)}.tbtn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tpane{display:none;padding:1rem}.tpane.active{display:block}
.ohead{display:flex;align-items:center;gap:.6rem;margin-bottom:.6rem}
.odot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.oname{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text2)}
.oline{flex:1;height:1px;background:var(--border2)}
.pblk{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;padding:.5rem .8rem}
.plb{font-size:.75rem;color:var(--text2);font-style:italic}
.pvl{font-family:'Cinzel',serif;font-size:1.2rem;color:var(--teal);font-weight:600}
.trl{display:flex;flex-direction:column;gap:.8rem}
.trn{font-family:'Cinzel',serif;font-size:.78rem;color:var(--teal);margin-bottom:.2rem;letter-spacing:.05em}
.trd{font-size:.83rem;color:var(--text2);line-height:1.55;font-style:italic}
.dice-area{display:flex;flex-direction:column;gap:.6rem}
.dice-row{display:flex;flex-wrap:wrap;gap:.4rem}
.dbtn{font-family:'Cinzel',serif;font-size:.75rem;padding:.4rem .7rem;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;color:var(--text2);cursor:pointer;transition:all .15s;letter-spacing:.05em}
.dbtn:hover{background:rgba(201,168,76,0.1);border-color:var(--gold3);color:var(--gold)}
.dres{font-family:'Cinzel Decorative',serif;font-size:2rem;color:var(--gold2);text-align:center;min-height:2.5rem;text-shadow:0 0 20px rgba(201,168,76,0.4)}
.dlog{font-size:.75rem;color:var(--text3);font-style:italic;text-align:center;min-height:1rem}
@keyframes rollB{0%{transform:scale(.6) rotate(-10deg);opacity:0}60%{transform:scale(1.15) rotate(3deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.rolling{animation:rollB .35s ease forwards}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="header">
  <div class="header-icon" id="hicon">⚔️</div>
  <div class="char-name" id="cname"></div>
  <div class="char-sub" id="csub"></div>
  <div class="hline"></div>
  <div class="badges" id="badges"></div>
</div>
<div class="body">
  <div class="side">
    <div class="panel"><div class="pt">Statistiche di Combattimento</div><div class="pb">
      <div class="cgrid">
        <div class="cstat ac"><div class="v" id="vac">—</div><div class="l">CA</div></div>
        <div class="cstat hp"><div class="v" id="vhp">—</div><div class="l">PF</div></div>
        <div class="cstat sp"><div class="v" id="vsp">—</div><div class="l">Vel.</div></div>
      </div>
      <div class="hpbar"><div class="hpfill" id="hpbar"></div></div>
      <div style="margin-top:.8rem"><div class="pblk"><span class="plb">Percezione Passiva</span><span class="pvl" id="vpp">—</span></div></div>
    </div></div>
    <div class="panel"><div class="pt">Caratteristiche</div><div class="pb"><div class="sgrid" id="sgrid"></div><div style="margin-top:.5rem;font-size:.65rem;color:var(--text3);font-style:italic;text-align:right">✦ = TS con competenza</div></div></div>
    <div class="panel"><div class="pt">Abilità</div><div class="pb" style="padding:.6rem .8rem"><div class="skl" id="skills"></div></div></div>
    <div class="panel"><div class="pt" id="rtitle">🧬 Tratti Razziali</div><div class="pb"><div class="trl" id="traits"></div></div></div>
    <div class="panel"><div class="pt">🎲 Tira Dado</div><div class="pb"><div class="dice-area"><div class="dice-row"><button class="dbtn" onclick="roll(4)">d4</button><button class="dbtn" onclick="roll(6)">d6</button><button class="dbtn" onclick="roll(8)">d8</button><button class="dbtn" onclick="roll(10)">d10</button><button class="dbtn" onclick="roll(12)">d12</button><button class="dbtn" onclick="roll(20)">d20</button><button class="dbtn" onclick="roll(100)">d100</button></div><div class="dres" id="dres">—</div><div class="dlog" id="dlog"></div></div></div></div>
  </div>
  <div class="main">
    <div class="panel"><div class="pt">⚔️ Attacchi</div><div class="pb"><div class="atks" id="attacks"></div></div></div>
    <div class="panel"><div class="tabs" id="tabs"></div><div id="tcontent"></div></div>
    <div class="panel" id="notesPanel" style="display:none"><div class="pt">📜 Note</div><div class="pb"><div id="notes" style="font-size:.9rem;color:var(--text2);white-space:pre-line;line-height:1.6"></div></div></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════
   LOAD JSON DINAMICO DA URL
   Usa il nome file HTML per costruire il path al JSON
   ══════════════════════════════════════════════════════════════ */

async function loadCharacter(){
  try{
    const fileName = window.location.pathname.split('/').pop().replace('.html','');
    const pathParts = window.location.pathname.split('/');
    const account = pathParts[pathParts.length - 2]; 
    const jsonUrl = `https://lev-seven.github.io/op-dnd/data/${account}/${fileName}_completo.json`;
    const res = await fetch(jsonUrl);
    if(!res.ok) throw new Error('JSON non trovato');
    const data = await res.json();
    const char = (data.character && data.character.name) ? data.character : data;

    init(char);

  }catch(err){
    document.body.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#e74c3c;font-family:Cinzel,serif;font-size:1.2rem;text-align:center;padding:2rem">
        Errore caricamento JSON.<br>
        Controlla il percorso o il nome file.<br><br>
        ${err.message}
      </div>
    `;
  }
}

/* ══════════════════════════════════════════════════════════════
   TRATTI RAZZIALI — Modifica manualmente
   ══════════════════════════════════════════════════════════════ */
function getRacialTraits(){
  return {
    emoji: "🧬",
    traits: [
      // { name: "Nome Tratto", desc: "Descrizione." },
    ]
  };
}

/* ══════════════════════════════════════════════════════════════
   LOGICA — Non modificare
   ══════════════════════════════════════════════════════════════ */
// Unwrap
//const char = (charData.character && charData.character.name) ? charData.character : charData;


let activeTab = '';

function typeClass(t){t=(t||'').toLowerCase();if(t==='passiva')return't-pas';if(t==='azione bonus')return't-bon';if(t==='reazione')return't-rea';if(t==='rituale')return't-rit';return't-az';}
function fmt(n){return n>=0?'+'+n:n;}
function cdVal(stat){return stat?8+(char.profBonus||0)+(char.stats[stat]?.mod||0):null;}
let char;
function init(char){
  char = arguments[0];
  if(!char||!char.name){document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#e74c3c;font-family:Cinzel,serif;font-size:1.2rem;text-align:center;padding:2rem">Errore: dati personaggio non trovati.<br>Incolla il JSON nel blocco charData.</div>';return;}

  document.title=char.name+' — Scheda Completa';
  document.getElementById('cname').textContent=char.name;
  document.getElementById('csub').textContent=(char.race||'?')+' · Livello '+(char.level||1);

  // Badges
  const bh=document.getElementById('badges');
  const cls=(char.classes||'').split('/').map(c=>`<span class="badge">${c.trim()}</span>`).join('');
  bh.innerHTML=cls+`<span class="badge">Competenza +${char.profBonus||2}</span>`+(char.hitDie?`<span class="badge">Dado Vita ${char.hitDie}</span>`:'');

  // Combat
  const eMax=Math.max(0,(char.hpMax||0)-(char.hpPerm||0));
  document.getElementById('vac').textContent=char.ac||'?';
  document.getElementById('vhp').textContent=(char.hpCurrent||char.hpMax||'?')+'/'+eMax;
  document.getElementById('vsp').textContent=(char.speed||'?')+'m';
  document.getElementById('vpp').textContent=char.passivePerception||'?';
  const pct=eMax>0?Math.max(0,((char.hpCurrent||char.hpMax||0)/eMax)*100):100;
  document.getElementById('hpbar').style.width=pct+'%';

  // Stats
  const labels={FOR:'Forza',DES:'Destrezza',COS:'Costituzione',INT:'Intelligenza',SAG:'Saggezza',CAR:'Carisma'};
  document.getElementById('sgrid').innerHTML=Object.entries(char.stats||{}).map(([k,s])=>{
    const sc=s.profSave?'color:var(--teal)':'color:var(--text3)';
    return`<div class="sblk"><div><div class="sn">${labels[k]||k}</div><div class="sv">${s.score}</div><div class="sm">${fmt(s.mod)}</div></div><div class="sr"><div class="ss" style="${sc}">TS ${fmt(s.save)}${s.profSave?' ✦':''}</div></div></div>`;
  }).join('');

  // Skills
  document.getElementById('skills').innerHTML=(char.skills||[]).map(s=>`<div class="skr"><span class="kn">${s.name}</span><span class="km">${fmt(s.mod)}</span></div>`).join('');

  // Racial traits
  const rt=getRacialTraits();
  document.getElementById('rtitle').textContent=rt.emoji+' Tratti Razziali — '+(char.race||'?');
  const tEl=document.getElementById('traits');
  if(!rt.traits.length){tEl.innerHTML='<div style="font-size:.8rem;color:var(--text3);font-style:italic">Nessun tratto definito.</div>';}
  else{tEl.innerHTML=rt.traits.map(t=>`<div><div class="trn">${t.name}</div><div class="trd">${t.desc}</div></div>`).join('');}

  // Attacks
  document.getElementById('attacks').innerHTML=(char.attacks||[]).map(a=>`<div class="atkc"><div class="an">${a.name}</div><div class="ah">+${a.hit}<span>per colpire</span></div><div class="ad">${a.damage}<span>${a.type||''}</span></div></div>`).join('');

  // Abilities tabs
  const origins=char.origins||[];
  activeTab=origins.length?origins[0].id:'all';
  renderTabs();

  // Notes
  if(char.notes){document.getElementById('notesPanel').style.display='block';document.getElementById('notes').textContent=char.notes;}
}

function renderAbCard(ab){
  const origin=(char.origins||[]).find(o=>o.id===ab.originId);
  const color=origin?.color||'#666';
  const rest=ab.rest==='lungo'?'Riposo lungo':ab.rest==='breve'?'Riposo breve':'';
  const cd=cdVal(ab.cdStat);
  let pips='';
  if(ab.maxUses>0){pips='<div class="pips">';for(let i=0;i<ab.maxUses;i++)pips+='<div class="pip"></div>';pips+='</div>';}
  return`<div class="abc"><div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${color};border-radius:3px 0 0 3px;opacity:.8"></div><div class="abt"><div class="abn">${ab.fav?'★ ':''}${ab.name}</div><div class="abty ${typeClass(ab.type)}">${ab.type}</div></div><div class="abd">${ab.desc||''}</div><div class="abf">${pips}<div style="display:flex;align-items:center;gap:.5rem;margin-left:auto">${cd?`<span class="abcd">CD ${cd}</span>`:''}${rest?`<span class="abr ${ab.rest}">${rest}</span>`:''}</div></div></div>`;
}

function renderTabs(){
  const origins=char.origins||[];
  const all=[{id:'all',name:'Tutte'},...origins];
  document.getElementById('tabs').innerHTML=all.map(o=>`<button class="tbtn ${activeTab===o.id?'active':''}" onclick="switchTab('${o.id}')">${o.name}</button>`).join('');

  let html='';
  if(activeTab==='all'){
    html='<div class="tpane active"><div style="display:flex;flex-direction:column;gap:1.2rem">';
    origins.forEach(o=>{
      const abs=(char.abilities||[]).filter(a=>a.originId===o.id);
      if(!abs.length)return;
      html+=`<div><div class="ohead"><div class="odot" style="background:${o.color}"></div><div class="oname">${o.name}</div><div class="oline"></div></div><div class="abg">${abs.map(renderAbCard).join('')}</div></div>`;
    });
    html+='</div></div>';
  }else{
    const abs=(char.abilities||[]).filter(a=>a.originId===activeTab);
    html=`<div class="tpane active"><div class="abg">${abs.map(renderAbCard).join('')}</div></div>`;
  }
  document.getElementById('tcontent').innerHTML=html;
}

function switchTab(id){activeTab=id;renderTabs();}
function roll(s){const r=Math.floor(Math.random()*s)+1;const el=document.getElementById('dres');el.textContent=r;el.classList.remove('rolling');void el.offsetWidth;el.classList.add('rolling');document.getElementById('dlog').textContent=`d${s} → ${r}`;}

window.addEventListener('DOMContentLoaded', loadCharacter);
</script>
</body>
</html>
